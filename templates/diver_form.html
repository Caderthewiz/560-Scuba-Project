{% extends "base.html" %}
{% block title %}{{ 'Edit Diver' if diver else 'New Diver' }} — ScubaDB{% endblock %}
{% block content %}

<div class="page-header">
  <h1 class="page-title">{{ 'Edit Diver' if diver else 'New Diver' }}</h1>
  <a href="{{ url_for('divers') }}" class="btn btn-ghost">← Back</a>
</div>

<div class="form-card">
  <form method="POST">
    <div class="form-grid">
      <div class="form-group">
        <label>First Name <span class="req">*</span></label>
        <input type="text" name="first_name"
               value="{{ diver.First_Name if diver else '' }}" required />
      </div>
      <div class="form-group">
        <label>Last Name <span class="req">*</span></label>
        <input type="text" name="last_name"
               value="{{ diver.Last_Name if diver else '' }}" required />
      </div>
      <div class="form-group">
        <label>Date of Birth</label>
        <input type="date" name="date_of_birth"
               value="{{ diver.Date_of_Birth if diver else '' }}" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email"
               value="{{ diver.Email if diver else '' }}" />
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="text" name="phone"
               value="{{ diver.Phone if diver else '' }}" />
      </div>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">
        {{ 'Save Changes' if diver else 'Add Diver' }}
      </button>
      <a href="{{ url_for('divers') }}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>

{% endblock %}
