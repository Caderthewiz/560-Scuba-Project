{% extends "base.html" %}
{% block title %}{{ 'Edit Dive Site' if site else 'New Dive Site' }} — ScubaDB{% endblock %}
{% block content %}

<div class="page-header">
  <h1 class="page-title">{{ 'Edit Dive Site' if site else 'New Dive Site' }}</h1>
  <a href="{{ url_for('dive_sites') }}" class="btn btn-ghost">← Back</a>
</div>

<div class="form-card">
  <form method="POST">
    <div class="form-grid">
      <div class="form-group">
        <label>Site Name <span class="req">*</span></label>
        <input type="text" name="site_name"
               value="{{ site.Site_Name if site else '' }}" required />
      </div>

      <div class="form-group">
        <label>Location</label>
        <input type="text" name="location"
               value="{{ site.Location if site else '' }}" />
      </div>

      <div class="form-group">
        <label>Max Depth (ft)</label>
        <input type="number" name="max_depth" min="0" step="0.1"
               value="{{ site.Max_Depth if site else '' }}" />
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">
        {{ 'Save Changes' if site else 'Add Site' }}
      </button>
      <a href="{{ url_for('dive_sites') }}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>

{% endblock %}
